services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: financiar
      POSTGRES_PASSWORD: financiar
      POSTGRES_DB: financiar
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financiar"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - financiar_shared_network

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    networks:
      - financiar_shared_network

volumes:
  postgres_data:

networks:
  financiar_shared_network:
    external: true