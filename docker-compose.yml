services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: financiar
      POSTGRES_PASSWORD: financiar
      POSTGRES_DB: financiar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financiar"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://financiar:financiar@db:5432/financiar
      RUST_LOG: info
      ALLOWED_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
